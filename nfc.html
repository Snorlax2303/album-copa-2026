<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Álbum Copa 2026 — 676 figurinhas. Gerencie sua coleção, troque repetidas, complete o álbum." />
  <meta name="theme-color" content="#0c0c0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest-nfc.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="./nfc-init.js?v=2" defer></script>
  <title>Copa 2026 — Álbum de Figurinhas</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --easing: cubic-bezier(0.16, 1, 0.3, 1);
      --bg-deep: #0c0c0d;
      --bg-base: #111113;
      --bg-elevated: #18181b;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --fg: #f0ede8;
      --fg-muted: rgba(240,237,232,0.45);
      --fg-dim: rgba(240,237,232,0.18);
      --accent: #d4af37;
      --accent-glow: rgba(212,175,55,0.18);
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --radius: 14px;
      --radius-sm: 8px;
      --font-display: 'Playfair Display', 'Georgia', serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 85% 50% at 50% -10%, rgba(180,150,60,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 35% at 85% 95%, rgba(212,175,55,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 15% 85%, rgba(100,80,30,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    /* ===== LOGO ===== */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      animation: fade-up 0.9s var(--easing) both;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      position: relative;
    }

    .logo-icon svg { width: 100%; height: 100%; }

    .logo-text { text-align: center; }

    .logo-text h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 1.6rem;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--fg);
    }

    .logo-text h1 i {
      font-style: italic;
      color: var(--accent);
    }

    .logo-text .subtitle {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-dim);
      margin-top: 0.3rem;
      font-family: var(--font-mono);
    }

    /* ===== DIVIDER ===== */
    .divider {
      width: 2.5rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
      animation: fade-up 0.9s 0.12s var(--easing) both;
    }

    /* ===== STATS ===== */
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      animation: fade-up 0.9s 0.2s var(--easing) both;
    }

    .stat {
      text-align: center;
      padding: 0.65rem 0.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.35s var(--easing);
    }

    .stat:active { transform: scale(0.97); }

    .stat .num {
      display: block;
      font-size: 1.35rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1.1;
      font-family: var(--font-display);
    }

    .stat .num.tenho { color: #4caf50; }
    .stat .num.rep { color: #ff9800; }
    .stat .num.falta { color: #ef5350; }

    .stat .label {
      display: block;
      font-size: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-dim);
      margin-top: 0.25rem;
      font-family: var(--font-mono);
    }

    /* ===== PROGRESS ===== */
    .progress-wrap {
      width: 100%;
      animation: fade-up 0.9s 0.28s var(--easing) both;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }

    .progress-header .pct {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .progress-header .meta {
      font-size: 0.55rem;
      color: var(--fg-dim);
      letter-spacing: 0.05em;
      font-weight: 400;
      font-family: var(--font-mono);
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 800ms var(--easing);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* ===== CARDS ===== */
    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      animation: fade-up 0.9s 0.38s var(--easing) both;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.1rem;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.4s var(--easing);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s var(--easing);
      border-radius: var(--radius);
    }

    .card--gerente::before {
      background: linear-gradient(135deg, rgba(255,152,0,0.06), transparent 70%);
    }
    .card--album::before {
      background: linear-gradient(135deg, rgba(76,175,80,0.06), transparent 70%);
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      background: var(--surface-hover);
    }

    .card:hover::before { opacity: 1; }
    .card:active { transform: translateY(0) scale(0.99); }

    .card-icon {
      width: 2.25rem;
      height: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: var(--font-display);
      font-size: 1rem;
      transition: border-color 0.3s var(--easing);
      border-radius: var(--radius-sm);
    }

    .card--gerente .card-icon {
      color: #ff9800;
      border-color: rgba(255,152,0,0.2);
    }
    .card--album .card-icon {
      color: #4caf50;
      border-color: rgba(76,175,80,0.2);
    }

    .card-body { flex: 1; min-width: 0; }

    .card-body .title {
      font-size: 0.85rem;
      font-weight: 600;
      display: block;
      margin-bottom: 0.1rem;
    }

    .card-body .desc {
      font-size: 0.65rem;
      color: var(--fg-muted);
      font-weight: 400;
    }

    .card-arrow {
      color: var(--fg-dim);
      font-size: 0.85rem;
      transition: all 0.35s var(--easing);
      flex-shrink: 0;
      font-family: var(--font-display);
    }

    .card:hover .card-arrow {
      color: var(--fg-muted);
      transform: translateX(4px);
    }

    .card--gerente:hover .card-icon { border-color: rgba(255,152,0,0.4); }
    .card--album:hover .card-icon { border-color: rgba(76,175,80,0.4); }

    /* ===== INSTALL ===== */
    .install-badge {
      display: none;
      cursor: pointer;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      color: var(--fg-dim);
      border: 1px solid var(--border);
      padding: 0.35rem 1rem;
      transition: all 0.35s var(--easing);
      animation: fade-up 0.9s 0.5s var(--easing) both;
      background: none;
      font-family: var(--font-mono);
      border-radius: 0;
    }

    .install-badge:hover {
      border-color: rgba(212,175,55,0.3);
      color: var(--accent);
    }

    /* ===== FOOTER ===== */
    .footer {
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-dim);
      opacity: 0.5;
      animation: fade-up 0.9s 0.55s var(--easing) both;
      font-weight: 400;
      text-align: center;
      font-family: var(--font-mono);
    }

    /* ===== ANIMATIONS ===== */
    .anim-item {
      opacity: 0;
      transform: translateY(14px);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 360px) {
      .container { padding: 1.5rem 1rem; gap: 1.5rem; }
      .logo-icon { width: 60px; height: 60px; }
      .logo-text h1 { font-size: 1.35rem; }
      .stat .num { font-size: 1.1rem; }
      .card { padding: 0.85rem; }
      .progress-header .pct { font-size: 1.5rem; }
    }

    @media (min-width: 540px) {
      .container { max-width: 480px; padding: 3rem 2rem; }
      .logo-icon { width: 84px; height: 84px; }
      .logo-text h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOGO -->
  <div class="logo anim-item">
    <div class="logo-icon" id="logo-icon">
      <svg viewBox="0 0 100 100" fill="none">
        <rect x="2.5" y="2.5" width="95" height="95" rx="10" stroke="#d4af37" stroke-width="1.8" fill="none"/>
        <circle cx="50" cy="36" r="22" stroke="#d4af37" stroke-width="2" fill="none"/>
        <path d="M50 16L67 33L62 55L38 55L33 33Z" fill="#FFDF00" opacity="0.85"/>
        <circle cx="50" cy="36" r="4.5" fill="#0c0c0d"/>
        <text x="50" y="72" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#d4af37" text-anchor="middle" letter-spacing="5">COPA</text>
        <text x="50" y="85" font-family="JetBrains Mono, monospace" font-size="6" font-weight="400" fill="rgba(240,237,232,0.25)" text-anchor="middle" letter-spacing="3">2026</text>
      </svg>
    </div>
    <div class="logo-text">
      <h1>álbum <i>copa 2026</i></h1>
      <div class="subtitle">676 figurinhas · 48 seleções</div>
    </div>
  </div>

  <div class="divider anim-item"></div>

  <!-- STATS -->
  <div class="stats anim-item">
    <div class="stat">
      <span class="num tenho" id="st-tenho">—</span>
      <span class="label">Tenho</span>
    </div>
    <div class="stat">
      <span class="num rep" id="st-repetida">—</span>
      <span class="label">Repetidas</span>
    </div>
    <div class="stat">
      <span class="num falta" id="st-falta">—</span>
      <span class="label">Falta</span>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap anim-item">
    <div class="progress-header">
      <span class="pct" id="st-pct">—</span>
      <span class="meta"><span id="st-tenho-count">0</span> / <span id="st-total">676</span></span>
    </div>
    <div class="progress-bar">
      <div class="fill" id="st-bar"></div>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards anim-item">
    <a href="gerente.html" class="card card--gerente anim-card">
      <div class="card-icon">✦</div>
      <div class="card-body">
        <span class="title">Gerenciar coleção</span>
        <span class="desc">Marcar figurinhas · Trocas · Input por código</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a href="index.html" class="card card--album anim-card">
      <div class="card-icon">◈</div>
      <div class="card-body">
        <span class="title">Abrir o álbum</span>
        <span class="desc">Visualizar catálogo · Dashboard · Filtros</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <!-- INSTALL -->
  <button class="install-badge" id="btn-install">+ instalar app</button>

  <div class="footer">Álbum Copa do Mundo 2026</div>
</div>

</body>
</html>
