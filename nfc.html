<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Álbum Copa 2026 — 676 figurinhas. Gerencie sua coleção." />
  <meta name="theme-color" content="#0c0c0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest-nfc.json" />
  <title>Copa 2026 — Álbum de Figurinhas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0d; --fg: #f0ede8; --gold: #d4af37;
      --font: 'Inter', -apple-system, sans-serif;
      --display: 'Playfair Display', 'Georgia', serif;
    }
    html { -webkit-text-size-adjust: 100%; height: 100%; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--fg);
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      overflow: hidden; -webkit-font-smoothing: antialiased;
    }
    .screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 1.5rem; padding: 2rem;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
      max-width: 360px;
    }
    .logo svg { width: 88px; height: 88px; }
    h1 { font-family: var(--display); font-weight: 400; font-size: 1.6rem; letter-spacing: -0.02em; }
    h1 i { color: var(--gold); font-style: italic; }
    p { color: rgba(240,237,232,0.5); font-size: 0.82rem; line-height: 1.6; max-width: 300px; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.9rem 2rem; font-size: 0.85rem; font-weight: 600;
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      cursor: pointer; border-radius: 8px; transition: all 0.3s ease;
      text-decoration: none; letter-spacing: 0.02em;
    }
    .btn:hover { background: rgba(212,175,55,0.1); transform: translateY(-1px); }
    .btn-primary { background: var(--gold); color: var(--bg); border: none; }
    .btn-primary:hover { background: #e0c04a; }
    .hint { color: rgba(240,237,232,0.25); font-size: 0.7rem; margin-top: 0.5rem; }
    .glow {
      position: fixed; top: -30%; left: -30%; width: 160%; height: 160%;
      background: radial-gradient(ellipse at 50% 40%, rgba(212,175,55,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: -1;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    .pulsing { animation: pulse 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="screen" id="screen">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none">
        <rect x="2.5" y="2.5" width="95" height="95" rx="10" stroke="#d4af37" stroke-width="1.5" fill="none"/>
        <circle cx="50" cy="36" r="22" stroke="#d4af37" stroke-width="1.8" fill="none"/>
        <path d="M50 16L67 33L62 55L38 55L33 33Z" fill="#FFDF00" opacity="0.85"/>
        <circle cx="50" cy="36" r="4.5" fill="#0c0c0d"/>
        <text x="50" y="72" font-family="Inter,sans-serif" font-size="10" font-weight="800" fill="#d4af37" text-anchor="middle" letter-spacing="5">COPA</text>
        <text x="50" y="85" font-family="JetBrains Mono,monospace" font-size="5.5" font-weight="400" fill="rgba(240,237,232,0.2)" text-anchor="middle" letter-spacing="3">2026</text>
      </svg>
    </div>

    <h1>álbum <i>copa 2026</i></h1>

    <p id="desc">Instale o app para gerenciar sua coleção de figurinhas de qualquer lugar.</p>

    <button class="btn btn-primary" id="btn-instalar">📲 Instalar app</button>

    <a class="btn" href="index.html" id="btn-entrar">Entrar no álbum →</a>

    <p class="hint" id="hint">ou encoste a tag NFC novamente ✨</p>
  </div>

  <script>
  (function() {
    'use strict';

    const isInstalled = window.matchMedia('(display-mode: standalone)').matches
      || window.matchMedia('(display-mode: minimal-ui)').matches
      || window.navigator.standalone === true;

    let deferredPrompt = null;

    // Se já instalado, redireciona direto pro álbum
    if (isInstalled) {
      window.location.href = 'index.html';
      return;
    }

    const btnInstalar = document.getElementById('btn-instalar');
    const btnEntrar = document.getElementById('btn-entrar');
    const hint = document.getElementById('hint');

    // Captura beforeinstallprompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // Instalação
    if (btnInstalar) {
      btnInstalar.addEventListener('click', async () => {
        if (!deferredPrompt) {
          // Fallback: instrução manual
          hint.innerHTML = 'No menu do Chrome (⋮), toque em <strong>"Adicionar à tela inicial"</strong>';
          hint.style.opacity = '1';
          return;
        }
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          localStorage.setItem('album-copa-nfc-visto', 'true');
          // Redireciona pro álbum
          window.location.href = 'index.html';
        }
        deferredPrompt = null;
      });
    }

    // Vibrar ao tocar
    function vibrate(ms) {
      if (navigator.vibrate) try { navigator.vibrate(ms); } catch(e) {}
    }
    document.querySelectorAll('button, a').forEach(el => {
      el.addEventListener('click', () => vibrate(30));
    });

    // Log
    console.log('[nfc-copa] Página carregada. Instalado:', isInstalled);
  })();
  </script>
</body>
</html>
