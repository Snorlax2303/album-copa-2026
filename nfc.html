<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Álbum Copa 2026 — 676 figurinhas. Gerencie sua coleção, troque repetidas, complete o álbum." />
  <meta name="theme-color" content="#0c0c0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,500;0,6..72,700;1,6..72,300&display=swap" rel="stylesheet" />
  <title>Copa 2026 — Álbum de Figurinhas</title>
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0c0c0d;
      color: #f0ede8;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND TEXTURE ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(60,45,20,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(40,25,10,0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== NOISE OVERLAY ===== */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ===== LOGO ===== */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fade-slide 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      position: relative;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
    }

    .logo-text {
      text-align: center;
    }

    .logo-text h1 {
      font-family: 'Newsreader', 'Georgia', serif;
      font-weight: 300;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #f0ede8;
    }

    .logo-text h1 em {
      font-style: italic;
      font-weight: 300;
      color: #d4af37;
    }

    .logo-text .sub {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.35);
      margin-top: 0.3rem;
      font-family: 'Inter', sans-serif;
    }

    /* ===== DIVIDER ===== */
    .divider {
      width: 2rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), transparent);
      animation: fade-slide 1s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ===== STATS ===== */
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      animation: fade-slide 1s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .stat {
      text-align: center;
      padding: 0.75rem 0.25rem;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      transition: border-color 0.3s;
    }

    .stat:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .stat .num {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .stat .num.tenho { color: #4caf50; }
    .stat .num.repetida { color: #ff9800; }
    .stat .num.falta { color: #ef5350; }

    .stat .label {
      display: block;
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.3);
      margin-top: 0.3rem;
    }

    /* ===== PROGRESS ===== */
    .progress-wrap {
      width: 100%;
      animation: fade-slide 1s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }

    .progress-header .pct {
      font-family: 'Newsreader', 'Georgia', serif;
      font-size: 2rem;
      font-weight: 300;
      color: #d4af37;
      line-height: 1;
    }

    .progress-header .meta {
      font-size: 0.6rem;
      color: rgba(240, 237, 232, 0.25);
      letter-spacing: 0.05em;
      font-weight: 400;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: #d4af37;
      width: 0%;
      transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ===== CARDS ===== */
    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: fade-slide 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.25rem;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.015);
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card--gerente::before {
      background: linear-gradient(135deg, rgba(255,152,0,0.04), transparent);
    }

    .card--album::before {
      background: linear-gradient(135deg, rgba(76,175,80,0.04), transparent);
    }

    .card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:active {
      transform: translateY(0);
    }

    .card-icon {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      font-size: 1.2rem;
    }

    .card--gerente .card-icon {
      color: #ff9800;
      border-color: rgba(255,152,0,0.2);
    }

    .card--album .card-icon {
      color: #4caf50;
      border-color: rgba(76,175,80,0.2);
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-body .title {
      font-size: 0.9rem;
      font-weight: 600;
      display: block;
      margin-bottom: 0.15rem;
    }

    .card-body .desc {
      font-size: 0.7rem;
      color: rgba(240, 237, 232, 0.35);
      font-weight: 400;
    }

    .card-arrow {
      color: rgba(240, 237, 232, 0.15);
      font-size: 0.9rem;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .card:hover .card-arrow {
      color: rgba(240, 237, 232, 0.5);
      transform: translateX(3px);
    }

    .card--gerente:hover .card-icon {
      border-color: rgba(255,152,0,0.4);
    }

    .card--album:hover .card-icon {
      border-color: rgba(76,175,80,0.4);
    }

    /* ===== FOOTER ===== */
    .footer {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.12);
      animation: fade-slide 1s 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
      font-weight: 400;
      text-align: center;
    }

    /* ===== INSTALL BADGE ===== */
    .install-badge {
      display: none;
      cursor: pointer;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      color: rgba(240, 237, 232, 0.25);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 0.35rem 1rem;
      transition: all 0.3s;
      animation: fade-slide 1s 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      background: none;
      font-family: 'Inter', sans-serif;
    }

    .install-badge:hover {
      border-color: rgba(212,175,55,0.3);
      color: #d4af37;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== SPLASH (primeira visita) ===== */
    #splash {
      animation: splash-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes splash-in {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 360px) {
      .container { padding: 1.5rem 1rem; gap: 1.5rem; }
      .logo-icon { width: 64px; height: 64px; }
      .logo-text h1 { font-size: 1.4rem; }
      .stat .num { font-size: 1.2rem; }
      .card { padding: 1rem; }
    }

    @media (min-width: 600px) {
      .container { max-width: 500px; padding: 3rem 2rem; }
      .logo-icon { width: 96px; height: 96px; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- ===== LOGO ===== -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="96" height="96" rx="10" stroke="#d4af37" stroke-width="2" fill="none"/>
        <circle cx="50" cy="38" r="24" stroke="#d4af37" stroke-width="2.5" fill="none"/>
        <path d="M50 16L68 34L63 58L37 58L32 34Z" fill="#FFDF00" opacity="0.9"/>
        <circle cx="50" cy="38" r="5" fill="#0c0c0d"/>
        <text x="50" y="74" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#d4af37" text-anchor="middle" letter-spacing="4">COPA</text>
        <text x="50" y="88" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="rgba(240,237,232,0.3)" text-anchor="middle" letter-spacing="2">2026</text>
      </svg>
    </div>
    <div class="logo-text">
      <h1>álbum <em>copa 2026</em></h1>
      <div class="sub">676 figurinhas · 48 seleções</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ===== STATS ===== -->
  <div class="stats">
    <div class="stat">
      <span class="num tenho" id="st-tenho">—</span>
      <span class="label">Tenho</span>
    </div>
    <div class="stat">
      <span class="num repetida" id="st-repetida">—</span>
      <span class="label">Repetidas</span>
    </div>
    <div class="stat">
      <span class="num falta" id="st-falta">—</span>
      <span class="label">Falta</span>
    </div>
  </div>

  <!-- ===== PROGRESS ===== -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="pct" id="st-pct">0%</span>
      <span class="meta"><span id="st-tenho-count">0</span> / <span id="st-total">676</span></span>
    </div>
    <div class="progress-bar">
      <div class="fill" id="st-bar"></div>
    </div>
  </div>

  <!-- ===== CARDS ===== -->
  <div class="cards">
    <a href="gerente.html" class="card card--gerente">
      <div class="card-icon">✦</div>
      <div class="card-body">
        <span class="title">Gerenciar coleção</span>
        <span class="desc">Marcar figurinhas &middot; Trocas &middot; Input por código</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a href="index.html" class="card card--album">
      <div class="card-icon">◈</div>
      <div class="card-body">
        <span class="title">Abrir o álbum</span>
        <span class="desc">Visualizar catálogo &middot; Dashboard &middot; Filtros</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <!-- ===== INSTALL ===== -->
  <button class="install-badge" id="btn-install">+ Instalar app</button>

  <div class="footer">Álbum Copa do Mundo 2026</div>
</div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'album-copa-2026-v3';
  const TOTAL = window.AlbumCopa ? window.AlbumCopa.data.total : 676;

  const isInstalled = window.matchMedia('(display-mode: standalone)').matches
    || window.matchMedia('(display-mode: minimal-ui)').matches
    || window.navigator.standalone === true;

  // ===== CARREGAR STATS =====
  function carregarStats() {
    const estados = new Map();
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const obj = JSON.parse(raw);
        Object.keys(obj).forEach(id => {
          if (['tenho', 'repetida'].includes(obj[id])) estados.set(id, obj[id]);
        });
      }
    } catch(e) {}

    const tenho = [...estados.values()].filter(v => v === 'tenho').length;
    const repetida = [...estados.values()].filter(v => v === 'repetida').length;
    const falta = Math.max(0, TOTAL - tenho - repetida);
    const pct = TOTAL ? Math.round((tenho / TOTAL) * 100) : 0;

    document.getElementById('st-tenho').textContent = tenho || '0';
    document.getElementById('st-repetida').textContent = repetida || '0';
    document.getElementById('st-falta').textContent = falta || '0';
    document.getElementById('st-pct').textContent = pct + '%';
    document.getElementById('st-tenho-count').textContent = tenho || '0';
    document.getElementById('st-total').textContent = TOTAL;
    document.getElementById('st-bar').style.width = pct + '%';
  }

  // ===== INSTALL =====
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!isInstalled) {
      document.getElementById('btn-install').style.display = 'inline-block';
    }
  });

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    document.getElementById('btn-install').style.display = 'none';
  });

  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('btn-install').style.display = 'none';
  });

  // ===== SERVICE WORKER =====
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ===== INIT =====
  // Esperar data.js carregar caso venha direto da NFC
  const tryLoad = setInterval(() => {
    if (window.AlbumCopa && window.AlbumCopa.data) {
      clearInterval(tryLoad);
      carregarStats();
    }
  }, 200);

  // Fallback: stats sem AlbumCopa
  setTimeout(() => {
    clearInterval(tryLoad);
    if (!window.AlbumCopa) {
      // Tenta carregar data.js dinamicamente
      const s = document.createElement('script');
      s.src = './data.js?v=3';
      s.onload = carregarStats;
      s.onerror = carregarStats; // fallback com TOTAL
      document.head.appendChild(s);
    }
  }, 1000);
})();
</script>
</body>
</html>
